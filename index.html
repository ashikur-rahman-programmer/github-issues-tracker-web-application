<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- tailwind + daisy linked -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdnjs linked -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font linked -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css linked -->
    <link rel="stylesheet" href="./style/style.css" />

    <!-- fav icon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <title>Github Tracker Web Application</title>
  </head>
  <body>
    <!-- login page -->
    <section id="login-page" class="container mx-auto">
      <div
        class="w-11/12 md:w-5/12 p-6 mx-auto my-16 rounded-xl shadow-md space-y-6"
      >
        <!-- logo + header -->
        <div class="text-center space-y-6">
          <figure class="flex justify-center">
            <img src="./assets/github-logo.png" alt="" />
          </figure>
          <div class="space-y-2">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-gray-600">Sign in to manage your issues</p>
          </div>
        </div>

        <!-- login form -->
        <fieldset class="fieldset rounded-box p-4 w-full mx-auto space-y-4">
          <div class="space-y-2">
            <label class="label text-lg font-bold">Username</label>
            <input
              id="user-input"
              type="text"
              class="input w-full text-lg py-6 outline-none font-semibold"
              placeholder="Enter Username"
            />
          </div>

          <div class="space-y-2">
            <label class="label text-lg font-bold">Password</label>
            <input
              id="password-input"
              type="password"
              class="input w-full text-lg py-6 outline-none font-semibold"
              placeholder="Enter Password"
            />
          </div>

          <button
            id="singin-btn"
            class="btn btn-primary py-6 rounded-xl text-lg mt-4"
          >
            Sing In
          </button>
        </fieldset>

        <!-- or setup -->
        <div class="flex items-center my-4">
          <div class="flex-grow border-t border-gray-300"></div>
          <span class="px-3 text-gray-500 font-medium">OR</span>
          <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <div class="text-center space-y-2">
          <p class="text-lg text-gray-800 font-medium">Demo Credentials:</p>
          <div class="py-6 w-full bg-gray-100 rounded-lg">
            <p>Username: admin</p>
            <p>Password: admin123</p>
          </div>
        </div>
      </div>
    </section>

    <!-- main page -->
    <main id="main-page" class="hidden container mx-auto"></main>

    <!-- js connected -->
    <script src="./script/script.js"></script>
  </body>
</html>
